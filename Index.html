<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Clock - Neo Brutalist Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 class="brand-title">DIGITAL_OS_V1</h1>
        <div class="clock-card">
            <div class="clock">
                <svg viewBox="0 0 570 150" preserveAspectRatio="xMidYMid meet">
                    <defs>
                        <filter id="glow">
                            <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
                            <feMerge>
                                <feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/>
                            </feMerge>
                        </filter>
                        <g id="horizontal">
                            <rect width="50" height="8" rx="4" />
                        </g>
                        <g id="vertical">
                            <rect width="8" height="60" rx="4" />
                        </g>
                    </defs>
                    <g id="d1" transform="translate(10,5)">
                        <use xlink:href="#horizontal" class="t" x="10" y="0"></use>
                        <use xlink:href="#vertical" class="tl" x="0" y="8"></use>
                        <use xlink:href="#vertical" class="tr" x="70" y="8"></use>
                        <use xlink:href="#horizontal" class="m" x="10" y="65"></use>
                        <use xlink:href="#vertical" class="bl" x="0" y="73"></use>
                        <use xlink:href="#vertical" class="br" x="70" y="73"></use>
                        <use xlink:href="#horizontal" class="b" x="10" y="130"></use>
                    </g>
                    <g id="d2" transform="translate(105,5)">
                        <use xlink:href="#horizontal" class="t" x="10" y="0"></use>
                        <use xlink:href="#vertical" class="tl" x="0" y="8"></use>
                        <use xlink:href="#vertical" class="tr" x="70" y="8"></use>
                        <use xlink:href="#horizontal" class="m" x="10" y="65"></use>
                        <use xlink:href="#vertical" class="bl" x="0" y="73"></use>
                        <use xlink:href="#vertical" class="br" x="70" y="73"></use>
                        <use xlink:href="#horizontal" class="b" x="10" y="130"></use>
                    </g>
                    <g class="separator" transform="translate(195, 50)">
                        <circle r="5" cx="0" cy="0" />
                        <circle r="5" cx="0" cy="40" />
                    </g>
                    <g id="d3" transform="translate(210,5)">
                        <use xlink:href="#horizontal" class="t" x="10" y="0"></use>
                        <use xlink:href="#vertical" class="tl" x="0" y="8"></use>
                        <use xlink:href="#vertical" class="tr" x="70" y="8"></use>
                        <use xlink:href="#horizontal" class="m" x="10" y="65"></use>
                        <use xlink:href="#vertical" class="bl" x="0" y="73"></use>
                        <use xlink:href="#vertical" class="br" x="70" y="73"></use>
                        <use xlink:href="#horizontal" class="b" x="10" y="130"></use>
                    </g>
                    <g id="d4" transform="translate(305,5)">
                        <use xlink:href="#horizontal" class="t" x="10" y="0"></use>
                        <use xlink:href="#vertical" class="tl" x="0" y="8"></use>
                        <use xlink:href="#vertical" class="tr" x="70" y="8"></use>
                        <use xlink:href="#horizontal" class="m" x="10" y="65"></use>
                        <use xlink:href="#vertical" class="bl" x="0" y="73"></use>
                        <use xlink:href="#vertical" class="br" x="70" y="73"></use>
                        <use xlink:href="#horizontal" class="b" x="10" y="130"></use>
                    </g>
                    <g class="separator" transform="translate(395, 50)">
                        <circle r="5" cx="0" cy="0" />
                        <circle r="5" cx="0" cy="40" />
                    </g>
                    <g id="d5" transform="translate(410,5)">
                        <use xlink:href="#horizontal" class="t" x="10" y="0"></use>
                        <use xlink:href="#vertical" class="tl" x="0" y="8"></use>
                        <use xlink:href="#vertical" class="tr" x="70" y="8"></use>
                        <use xlink:href="#horizontal" class="m" x="10" y="65"></use>
                        <use xlink:href="#vertical" class="bl" x="0" y="73"></use>
                        <use xlink:href="#vertical" class="br" x="70" y="73"></use>
                        <use xlink:href="#horizontal" class="b" x="10" y="130"></use>
                    </g>
                    <g id="d6" transform="translate(505,5)">
                        <use xlink:href="#horizontal" class="t" x="10" y="0"></use>
                        <use xlink:href="#vertical" class="tl" x="0" y="8"></use>
                        <use xlink:href="#vertical" class="tr" x="70" y="8"></use>
                        <use xlink:href="#horizontal" class="m" x="10" y="65"></use>
                        <use xlink:href="#vertical" class="bl" x="0" y="73"></use>
                        <use xlink:href="#vertical" class="br" x="70" y="73"></use>
                        <use xlink:href="#horizontal" class="b" x="10" y="130"></use>
                    </g>
                </svg>
            </div>
        </div>
        <div class="footer">CREATIVE_ENGINE: SPY-E // 2026</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
